name: Archive Phase 1 JIT test evidence

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      DEPLOY_SERVICE_ACCOUNT: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
      - name: Archive JIT records as Phase 1 evidence
        run: node scripts/ci/archivePhase1JitEvidence.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: phase1-jit-evidence-archive
          path: phase1-jit-evidence-archive.json
          if-no-files-found: error
