# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools
# Trigger deploy check with automatic secrets

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_FACTUBOLT }}'

      - name: Deploy to Firebase Hosting
        run: |
          npx firebase-tools deploy --only hosting --project factubolt --debug > firebase-debug.log 2>&1
          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            LOG_CONTENT=$(tail -n 60 firebase-debug.log | tr '\n' '\r' | sed 's/\r/%0A/g')
            echo "::error::Deploy failed with exit code $EXIT_CODE.%0ALast logs:%0A$LOG_CONTENT"
          fi
          exit $EXIT_CODE
