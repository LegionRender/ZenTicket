# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools
# Trigger deploy check with automatic secrets

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
      - name: Authenticate and Deploy to Firebase Hosting
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_FACTUBOLT }}' > gcp-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=gcp-key.json
          npx firebase-tools deploy --only hosting --project factubolt
