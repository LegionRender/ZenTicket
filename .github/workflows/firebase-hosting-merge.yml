# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools
# Trigger deploy check with automatic secrets

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_FACTUBOLT }}'

      - name: Deploy to Firebase Hosting
        run: |
          node -e "
          const { spawnSync } = require('child_process');
          const result = spawnSync('npx', ['firebase-tools', 'deploy', '--only', 'hosting', '--project', 'factubolt', '--debug'], { encoding: 'utf8', shell: true });
          
          if (result.status !== 0) {
            const logs = (result.stdout || '') + '\n' + (result.stderr || '');
            const lastLines = logs.split('\n').slice(-60).join('\n');
            const sanitized = lastLines.replace(/\r/g, '').replace(/\n/g, '%0A').replace(/:/g, '%3A').replace(/,/g, '%2C');
            console.log('::error::Deploy failed with exit code ' + result.status + '.%0ALast logs:%0A' + sanitized);
            process.exit(result.status || 1);
          }
          "
