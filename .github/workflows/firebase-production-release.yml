name: Release Firebase backend and rules

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      DEPLOY_SERVICE_ACCOUNT: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate release configuration
        run: |
          test -n "$PROJECT_ID"
          test -n "$WORKLOAD_IDENTITY_PROVIDER"
          test -n "$DEPLOY_SERVICE_ACCOUNT"
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install Firebase CLI
        run: npm ci
      - name: Install Functions dependencies
        run: npm ci --prefix firebase/functions
      - name: Deploy Functions and Firestore Rules
        run: npx firebase-tools deploy --only functions,firestore:rules --project="$PROJECT_ID" --non-interactive
