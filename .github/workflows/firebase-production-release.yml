name: Release Firebase backend and rules

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      DEPLOY_SERVICE_ACCOUNT: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
      RUNNER_TASK_QUEUE: ${{ vars.RUNNER_TASK_QUEUE }}
      RUNNER_TASK_LOCATION: ${{ vars.RUNNER_TASK_LOCATION }}
      RUNNER_URL: ${{ vars.RUNNER_URL }}
      RUNNER_TASK_INVOKER_SERVICE_ACCOUNT: ${{ vars.RUNNER_TASK_INVOKER_SERVICE_ACCOUNT }}
      OPENAI_VISION_MODEL: ${{ vars.OPENAI_VISION_MODEL }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate release configuration
        run: |
          test -n "$PROJECT_ID"
          test -n "$WORKLOAD_IDENTITY_PROVIDER"
          test -n "$DEPLOY_SERVICE_ACCOUNT"
          test -n "$RUNNER_TASK_QUEUE"
          test -n "$RUNNER_TASK_LOCATION"
          test -n "$RUNNER_URL"
          test -n "$RUNNER_TASK_INVOKER_SERVICE_ACCOUNT"
          test -n "$OPENAI_VISION_MODEL"
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install Firebase CLI
        run: npm ci
      - name: Bundle shared backend with Functions
        run: cp -R shared firebase/functions/shared
      - name: Install Functions dependencies
        run: npm ci --prefix firebase/functions
      - name: Configure Firebase runtime parameters
        run: |
          umask 077
          {
            printf 'RUNNER_TASK_QUEUE=%s\n' "$RUNNER_TASK_QUEUE"
            printf 'RUNNER_TASK_LOCATION=%s\n' "$RUNNER_TASK_LOCATION"
            printf 'RUNNER_URL=%s\n' "$RUNNER_URL"
            printf 'RUNNER_TASK_INVOKER_SERVICE_ACCOUNT=%s\n' "$RUNNER_TASK_INVOKER_SERVICE_ACCOUNT"
            printf 'OPENAI_VISION_MODEL=%s\n' "$OPENAI_VISION_MODEL"
          } > firebase/functions/.env.factubolt
      - name: Deploy Functions and Firestore Rules
        run: npx firebase-tools deploy --only functions,firestore:rules --project="$PROJECT_ID" --non-interactive
