<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ZenTicket - Pago Exitoso</title>
  <style>
    body {
      background-color: #0f172a;
      color: #ffffff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .spinner {
      border: 3px solid rgba(255,255,255,0.1);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border-left-color: #0b53f4;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h2 style="margin: 0 0 10px 0; font-size: 18px; font-weight: 800;">Procesando tu pago</h2>
  <p style="margin: 0; font-size: 13px; color: #94a3b8;">Sincronizando con ZenTicket, por favor espera...</p>

  <script>
    const params = new URLSearchParams(window.location.search);
    const status = params.get("status") || "success";
    const plan = params.get("plan");
    const sessionId = params.get("session_id");

    if (window.opener) {
      window.opener.postMessage({ type: "stripe_payment_success", plan, sessionId }, "*");
      window.close();
    } else {
      window.location.href = "/workspace?tab=cuenta&status=success&plan=" + encodeURIComponent(plan || "") + "&session_id=" + encodeURIComponent(sessionId || "");
    }
  </script>
</body>
</html>
